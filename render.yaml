services:
  - type: web
    name: poke-market
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: poke-market-db
          property: connectionString

databases:
  - name: poke-market-db
    databaseName: poke_market
    user: poke_market_user
    plan: starter